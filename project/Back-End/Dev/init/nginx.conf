user							nginx;
worker_processes				1;

error_log						/var/log/nginx.err;
pid								/home/nginx/www/init/run/nginx.pid;
events {
	worker_connections			1024;
}


http {
	include						/etc/nginx/mime.types;
	default_type				application/octet-stream;

	log_format  main			'$remote_addr - $remote_user [$time_local] "$request" '
								'$status $body_bytes_sent "$http_referer" '
								'"$http_user_agent" "$http_x_forwarded_for"';

	access_log					/var/log/nginx.log  main;
	etag						on;
	sendfile					on;
	gzip						on;
	gzip_proxied				any;
	gzip_types					text/xml text/css application/javascript text/plain image/svg+xml application/json;
	gzip_vary					on;
	gzip_comp_level				5;

	upstream django {
		server					unix:////home/nginx/www/init/run/uwsgi.sock;
	}

	map $http_upgrade $connection_upgrade {
		default 				upgrade;
		''      				close;
	}
	upstream websocket {
		server 					127.0.0.1:1306;
	}

	server {
		listen					80 default_server;

		charset					utf-8;
		client_max_body_size	1024M;

		location /media  {
			alias				/home/nginx/www/media;
		}

		location /html {
			alias				/home/nginx/www/html/;
		}

		location / {
			uwsgi_pass			django;
			include				/home/nginx/www/init/uwsgi.params;
		}
	}
}

