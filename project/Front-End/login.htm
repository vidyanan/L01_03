<!DOCTYPE html>
<html>
<!-- default login page -->
    <head>
        <meta http-equiv="Content-Type" content="Content-Type: text/html; charset=utf-8" />
        <link rel="shortcut icon" href="/media/image/icon.ico" type="image/x-icon"/>
		<link rel="icon" href="/media/image/icon.ico" type="image/x-icon"/>
        <title>User Login</title>
        <link rel="stylesheet" type="text/css" href="/media/style/default.css" />
    </head>
    <body>
        <div id="loginDiv" class="center" style="width:400px; height:160px;">
            <form id="loginForm" action="/login/" method="post">
				<table style="border:1px solid #AAA">
					<tr>
						<td style="background-color:#CCC; font-weight:bold">
							User Login
						</td>
					</tr>
					<tr>
						<td align="center" height="130" valign="middle" width="420">
							<table width="350">
								<tr>
									<td width="70">Email</td>
									<td width="180">
										<input id='emai' name="email" style="width:180px" type="text">
									</td>
									<td rowspan="4" align="center" valign="top">
										<img src="/media/image/project.png" align="right" style="width: 96px; top: -10px;"></td>
								</tr>
								<tr>
									<td>Password</td>
									<td>
										<input id="password" name="password" style="width:180px" type="password">
									</td>
								</tr>
								<tr>
									<td></td>
									<td id="errorMsg" height="10" style="color: red;">&nbsp;</td>
								</tr>
								<tr>
									<td></td>
									<td align="right">
										<input type="submit" name="login" value="Login" style="width:80px"/>
									</td>
								</tr>
							</table>
						</td>
					</tr>
				</table>
			</form>
		</div>
	</body>
</html>
