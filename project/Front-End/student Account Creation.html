<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="style.css">
		<title>Student Account Creation</title>
		<object type="text/html" data="navbarTA.html" width="100%" height="50"></object>
	</head>
	
	<body>
		<script type="text/javascript" src="./superCreation.js"></script>
		<div class="studentinfo">
			
			<h1>Student Account Creation</h1>
	
			<form  id="regForm" action="http://www.yinlinhai.com/account/student/" method="post">
				Username:<br>
			  	<input class="student-info" type="text" id="name" name="name">
				<br><br>
				Email:<br>
			  	<input class="student-info" type="text" id="email" name="email">
				<br><br>
				Password:<br>
			  	<input class="student-info" type="password" id="password" name="password">
				<br><br>
				or upload a file
				<input type="file" name="excel" accept=".txt" onchange="readFile(this.files)">  <!--".xlsx">-->
				<input type="submit" value="Submit" onclick="createAccount()">
			</form> 
		</div>

	</body>
</html>
