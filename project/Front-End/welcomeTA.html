	<style>
	#leaderboard {
		float: right;
		margin-right:2%;
	    font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
	    border-collapse: collapse;
	    
	}

	#leaderboard td, #leaderboard th {
	    border: 1px solid #ddd;
	    padding: 8px;
	}

	#leaderboard tr:nth-child(even){background-color: #f2f2f2;}
	#leaderboard tr:nth-child(odd){background-color: #f2f2f2;}
	
	#leaderboard tr:hover {background-color: #ddd;}

	#leaderboard th {
	    padding-top: 12px;
	    padding-bottom: 12px;
	    text-align: left;
	    background-color: #a3cbd8;
	    color: white;
	}
	/* Flash class and keyframe animation */
	.flashit{
	  color:blue;
		-webkit-animation: flash linear 1s infinite;
		animation: flash linear 1s infinite;
	}
	@-webkit-keyframes flash {
		0% { opacity: 1; } 
		50% { opacity: .1; } 
		100% { opacity: 1; }
	}
	@keyframes flash {
		0% { opacity: 1; } 
		50% { opacity: .1; } 
		100% { opacity: 1; }
	}
	</style>


	<table id="leaderboard">
	  <tr stlye="aign;centre;">

	  </tr>

	  </tr>
	  <tr>

	  </tr>
	  <tr>

	  </tr>
	  <tr>
	    <td id="s3" class="flashit"></td>

	  </tr>
	</table>
