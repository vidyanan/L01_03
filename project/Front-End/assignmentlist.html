<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- webpage header -->
		<link rel="stylesheet" href="style.css">
		<title>Assignment List</title>
		<object type="text/html" data="navbarTA.html" width="100%" height="75"></object>
		
		
        <script type="text/javascript" src="http://code.jquery.com/jquery.min.js"></script>

	</head>

	<body>
		<h1 class='cscc01'>Assignment List</h1>

		<div id="div1">
			<table id="atable" width="auto">
			  <tr>
			    <th><b>Name<b></th>
			    <th><b>Start Date<b></th> 
			    <th><b>End Date<b></th>
			  </tr>
			</table>
			
			<table id="dataTable" style="width:100%">

			</table>
		</div>


		
		
		
		
		<input type="button" onclick="location.href='http://www.yinlinhai.com/html/assignmentcreation.html';" value="Create Assignments" />
		
		<script type="text/javascript">
	
				
			$.getJSON("http://www.yinlinhai.com/assignments/get/", function(data) {
				
				//var ul = document.createElement('ul');
				//console.log("hello");	
				console.log(data);
				var assignments = data["assignments"];
				var table = document.getElementById("atable");
				for(var i=0;i<assignments.length;i++){
					//var tr = document.createElement("table");
				    
				    var row = table.insertRow(-1);
				    var cell1 = row.insertCell(0);
				    var cell2 = row.insertCell(1);
					var cell3 = row.insertCell(2);
					
					var str = data["assignments"][i]["name"];
					var link = "http://www.yinlinhai.com/assignments/" + data["assignments"][i]["id"] + "/get/";
					
				    cell1.innerHTML = str.link(link);
				    cell2.innerHTML = data["assignments"][i]["start-date"];
					cell3.innerHTML = data["assignments"][i]["end-date"];
					
				}
			});

		</script>
		
	</body>
</html>
